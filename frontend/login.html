<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Check — FraudShield</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="index.html">
    <span class="dot"></span>FraudShield
  </a>
  <ul class="nav-links">
    <li><a href="login.html" class="active">Login</a></li>
    <li><a href="signup.html">Signup</a></li>
    <li><a href="payment.html">Payment</a></li>
    <li><a href="promo.html">Promo</a></li>
    <li><a href="dashboard.html" class="dashboard-link">⬡ Dashboard</a></li>
  </ul>
</nav>

<div class="page">
  <div class="page-header">
    <div class="module-tag">Module 01 / Account Takeover</div>
    <h1>Login Check</h1>
    <p>Submit a login attempt and see the combined rule engine + ML verdict.</p>
  </div>

  <!-- Quick-fill presets -->
  <div class="presets">
    <button class="preset-btn" onclick="fillPreset('clean')">Clean login</button>
    <button class="preset-btn fraud" onclick="fillPreset('ato1')">⚠ ATO — country change</button>
    <button class="preset-btn fraud" onclick="fillPreset('ato2')">⚠ ATO — brute force</button>
    <button class="preset-btn fraud" onclick="fillPreset('ato3')">⚠ ATO — full combo</button>
  </div>

  <form id="loginForm">
    <div class="card">
      <div class="card-title">User Identity</div>
      <div class="field-row">
        <div class="field">
          <label>User ID</label>
          <input type="text" id="user_id" placeholder="u_001" required>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="user@example.com" required>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>IP Address</label>
          <input type="text" id="ip_address" placeholder="203.0.113.1" required>
        </div>
        <div class="field">
          <label>Login Timestamp</label>
          <input type="datetime-local" id="login_timestamp" required>
        </div>
      </div>
      <div class="field">
        <label>User Agent</label>
        <input type="text" id="user_agent" placeholder="Mozilla/5.0 (Windows NT 10.0)">
      </div>
    </div>

    <div class="card">
      <div class="card-title">Historical Context</div>
      <div class="field-row">
        <div class="field">
          <label>Last Known IP</label>
          <input type="text" id="last_known_ip" placeholder="192.168.1.1">
        </div>
        <div class="field">
          <label>Last Login Time</label>
          <input type="datetime-local" id="last_login_time">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Last Known Country</label>
          <input type="text" id="last_known_country" placeholder="US" maxlength="2">
        </div>
        <div class="field">
          <label>Current Country</label>
          <input type="text" id="current_country" placeholder="US" maxlength="2">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Risk Signals</div>
      <div class="field">
        <label>Failed Attempts (last 24h)</label>
        <input type="number" id="failed_attempts" value="0" min="0" max="50">
      </div>
      <div class="toggle-field">
        <label>New Device</label>
        <label class="toggle">
          <input type="checkbox" id="new_device">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">
      Run Fraud Check →
    </button>
  </form>

  <div id="result" style="display:none"></div>
  <div id="errorMsg" style="display:none"></div>
</div>

<script>
const API = 'http://127.0.0.1:8000';

// Set default timestamp to now
document.getElementById('login_timestamp').value = new Date().toISOString().slice(0,16);
document.getElementById('last_login_time').value  = new Date(Date.now() - 86400000).toISOString().slice(0,16);

const PRESETS = {
  clean: {
    user_id: 'u_001', email: 'alice@gmail.com', ip_address: '72.14.192.5',
    user_agent: 'Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)',
    last_known_ip: '72.14.192.5', last_known_country: 'US', current_country: 'US',
    failed_attempts: 0, new_device: false,
  },
  ato1: {
    user_id: 'u_042', email: 'bob@gmail.com', ip_address: '91.108.56.130',
    user_agent: 'Mozilla/5.0 (Windows NT 6.1)',
    last_known_ip: '192.168.1.10', last_known_country: 'US', current_country: 'RU',
    failed_attempts: 2, new_device: true,
  },
  ato2: {
    user_id: 'u_099', email: 'charlie@outlook.com', ip_address: '198.51.100.77',
    user_agent: 'python-requests/2.31',
    last_known_ip: '192.168.0.5', last_known_country: 'US', current_country: 'US',
    failed_attempts: 12, new_device: false,
  },
  ato3: {
    user_id: 'u_777', email: 'victim@icloud.com', ip_address: '114.119.156.48',
    user_agent: 'Mozilla/5.0 (Linux; Android 10)',
    last_known_ip: '10.0.0.1', last_known_country: 'US', current_country: 'CN',
    failed_attempts: 9, new_device: true,
  },
};

function fillPreset(key) {
  const p = PRESETS[key];
  Object.entries(p).forEach(([k, v]) => {
    const el = document.getElementById(k);
    if (!el) return;
    if (el.type === 'checkbox') el.checked = v;
    else el.value = v;
  });
  // Set odd-hour timestamp for fraud presets
  if (key !== 'clean') {
    const d = new Date();
    d.setHours(2, 30, 0, 0);
    document.getElementById('login_timestamp').value = d.toISOString().slice(0,16);
  }
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const resultEl = document.getElementById('result');
  const errorEl  = document.getElementById('errorMsg');

  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  btn.classList.add('loading');
  resultEl.style.display = 'none';
  errorEl.style.display  = 'none';

  const body = {
    user_id:            document.getElementById('user_id').value,
    email:              document.getElementById('email').value,
    ip_address:         document.getElementById('ip_address').value,
    user_agent:         document.getElementById('user_agent').value || 'Mozilla/5.0',
    login_timestamp:    document.getElementById('login_timestamp').value,
    last_known_ip:      document.getElementById('last_known_ip').value || null,
    last_login_time:    document.getElementById('last_login_time').value || null,
    last_known_country: document.getElementById('last_known_country').value || null,
    current_country:    document.getElementById('current_country').value || null,
    failed_attempts:    parseInt(document.getElementById('failed_attempts').value) || 0,
    new_device:         document.getElementById('new_device').checked,
  };

  try {
    const res = await fetch(`${API}/check/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const data = await res.json();
    renderResult(resultEl, data);
    resultEl.style.display = 'block';
  } catch (err) {
    errorEl.innerHTML = `<div class="error-msg">⚠ ${err.message}<br><small>Make sure the FastAPI server is running at ${API}</small></div>`;
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run Fraud Check →';
    btn.classList.remove('loading');
  }
});

function renderResult(el, data) {
  const action = data.action.toLowerCase();
  const score  = (data.fraud_score * 100).toFixed(1);
  const pct    = data.fraud_score * 100;
  const scoreClass = pct >= 85 ? 'high' : pct >= 55 ? 'mid' : '';

  const flagsHtml = data.rule_flags.length
    ? data.rule_flags.map(f => `<div class="flag-item">${f}</div>`).join('')
    : `<div class="no-flags">No rule violations detected</div>`;

  el.className = `result ${action}`;
  el.innerHTML = `
    <div class="result-header">
      <span class="action-badge">${data.action.toUpperCase()}</span>
      <span style="font-size:0.78rem;color:var(--text-dim);">
        ${action === 'block' ? '🚫 Access denied' : action === 'review' ? '🔍 Manual review required' : '✓ Access granted'}
      </span>
      <div class="result-score">Fraud Score <span class="${scoreClass}">${score}%</span></div>
    </div>
    <div class="result-body">
      <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div>
      <div class="flags-title">Rule Engine Flags (${data.rule_flags.length})</div>
      ${flagsHtml}
      <div class="result-meta">
        <div>Module <span>${data.module}</span></div>
        <div>Request ID <span>#${data.request_id}</span></div>
        <div>ML Score <span>${data.fraud_score}</span></div>
      </div>
    </div>`;
}
</script>
</body>
</html>
