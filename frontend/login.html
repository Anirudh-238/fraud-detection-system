<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FraudShield</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrap {
      min-height: calc(100vh - 57px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-header { margin-bottom: 2rem; text-align: center; }
    .auth-header .module-tag {
      font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--text-dim); margin-bottom: 0.5rem;
    }
    .auth-header h1 {
      font-family: var(--display); font-size: 1.8rem; font-weight: 800;
      color: var(--text-bright); letter-spacing: -0.03em;
    }
    .auth-header p { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.4rem; }
    .auth-footer { text-align: center; margin-top: 1.25rem; font-size: 0.78rem; color: var(--text-dim); }
    .auth-footer a { color: var(--blue); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .verdict {
      border-radius: 6px; padding: 1rem 1.25rem; margin-top: 1.25rem;
      font-size: 0.82rem; animation: slideDown 0.25s ease; display: none;
    }
    .verdict.allow  { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
    .verdict.review { background: rgba(245,166,35,0.08); border: 1px solid var(--amber); color: var(--amber); }
    .verdict.block  { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
    .verdict-title  { font-weight: 700; margin-bottom: 0.25rem; font-size: 0.88rem; }
    .verdict-score  { font-size: 0.72rem; opacity: 0.8; margin-top: 0.4rem; }
    .verdict-flags  { margin-top: 0.5rem; font-size: 0.72rem; opacity: 0.8; }
    .verdict-flags li { margin-left: 1rem; margin-top: 0.2rem; }
    .debug-toggle { text-align: center; margin-top: 2rem; }
    .debug-toggle button {
      background: none; border: 1px solid transparent; font-family: var(--mono);
      font-size: 0.68rem; color: var(--text-dim); cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.08em; padding: 0.3rem 0.5rem;
      border-radius: 3px; transition: all 0.12s;
    }
    .debug-toggle button:hover { border-color: var(--border); color: var(--text); }
    .debug-panel {
      display: none; margin-top: 1rem; background: var(--bg-3);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 1rem; font-size: 0.72rem; color: var(--text-dim); text-align: left;
    }
    .debug-panel .row {
      display: flex; justify-content: space-between;
      padding: 0.25rem 0; border-bottom: 1px solid var(--border);
    }
    .debug-panel .row:last-child { border: none; }
    .debug-panel .row span { color: var(--text); }
  </style>
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="index.html"><span class="dot"></span>FraudShield</a>
  <ul class="nav-links">
    <li><a href="login.html" class="active">Login</a></li>
    <li><a href="signup.html">Signup</a></li>
    <li><a href="payment.html">Payment</a></li>
    <li><a href="promo.html">Promo</a></li>
    <li><a href="dashboard.html" class="dashboard-link">⬡ Dashboard</a></li>
  </ul>
</nav>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-header">
      <div class="module-tag">Module 01 / Account Takeover</div>
      <h1>Welcome back</h1>
      <p>Sign in to your account</p>
    </div>
    <div class="card">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button class="btn-submit" id="submitBtn" onclick="doLogin()">Sign In →</button>
    </div>
    <div class="verdict" id="verdict">
      <div class="verdict-title" id="verdictTitle"></div>
      <div id="verdictMsg"></div>
      <div class="verdict-score" id="verdictScore"></div>
      <ul class="verdict-flags" id="verdictFlags"></ul>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
    <div class="debug-toggle">
      <button onclick="toggleDebug()">⬡ Show fraud engine signals</button>
      <div class="debug-panel" id="debugPanel">
        <div class="row">Fraud Score <span id="dbgScore">—</span></div>
        <div class="row">Final Action <span id="dbgAction">—</span></div>
        <div class="row">Rule Flags <span id="dbgFlags">—</span></div>
      </div>
    </div>
  </div>
</div>
<script>
const API = 'http://127.0.0.1:8000';

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submitBtn');
  if (!email || !password) return;
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  hideVerdict();
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    showVerdict(data);
    updateDebug(data);
  } catch (err) {
    showError('Could not reach server. Is FastAPI running?');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In →';
  }
}

function showVerdict(data) {
  const el    = document.getElementById('verdict');
  const title = document.getElementById('verdictTitle');
  const msg   = document.getElementById('verdictMsg');
  const score = document.getElementById('verdictScore');
  const flags = document.getElementById('verdictFlags');
  const action = data.action;
  const pct    = ((data.fraud_score || 0) * 100).toFixed(1);
  el.className = `verdict ${action}`;
  if (action === 'allow')       title.textContent = `✓ Welcome, ${data.user?.full_name || 'back'}!`;
  else if (action === 'review') title.textContent = '⚠ Login allowed — activity flagged';
  else                          title.textContent = '✗ Login blocked';
  msg.textContent   = data.message;
  score.textContent = `Fraud score: ${pct}%`;
  flags.innerHTML   = '';
  (data.flags || []).forEach(f => {
    const li = document.createElement('li');
    li.textContent = f;
    flags.appendChild(li);
  });
  el.style.display = 'block';
}

function hideVerdict() { document.getElementById('verdict').style.display = 'none'; }

function showError(msg) {
  const el = document.getElementById('verdict');
  el.className = 'verdict block';
  document.getElementById('verdictTitle').textContent = '✗ Error';
  document.getElementById('verdictMsg').textContent   = msg;
  document.getElementById('verdictScore').textContent = '';
  document.getElementById('verdictFlags').innerHTML   = '';
  el.style.display = 'block';
}

function updateDebug(data) {
  document.getElementById('dbgScore').textContent  = data.fraud_score ?? '—';
  document.getElementById('dbgAction').textContent = (data.action || '—').toUpperCase();
  document.getElementById('dbgFlags').textContent  = (data.flags || []).length + ' flags';
}

function toggleDebug() {
  const p = document.getElementById('debugPanel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
