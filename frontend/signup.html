<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — FraudShield</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrap {
      min-height: calc(100vh - 57px);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1.5rem;
    }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-header { margin-bottom: 2rem; text-align: center; }
    .auth-header .module-tag {
      font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--text-dim); margin-bottom: 0.5rem;
    }
    .auth-header h1 {
      font-family: var(--display); font-size: 1.8rem; font-weight: 800;
      color: var(--text-bright); letter-spacing: -0.03em;
    }
    .auth-header p { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.4rem; }
    .auth-footer { text-align: center; margin-top: 1.25rem; font-size: 0.78rem; color: var(--text-dim); }
    .auth-footer a { color: var(--blue); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .verdict {
      border-radius: 6px; padding: 1rem 1.25rem; margin-top: 1.25rem;
      font-size: 0.82rem; animation: slideDown 0.25s ease; display: none;
    }
    .verdict.allow  { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
    .verdict.review { background: rgba(245,166,35,0.08); border: 1px solid var(--amber); color: var(--amber); }
    .verdict.block  { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
    .verdict-title  { font-weight: 700; margin-bottom: 0.25rem; font-size: 0.88rem; }
    .verdict-score  { font-size: 0.72rem; opacity: 0.8; margin-top: 0.4rem; }
    .verdict-flags  { margin-top: 0.5rem; font-size: 0.72rem; opacity: 0.8; }
    .verdict-flags li { margin-left: 1rem; margin-top: 0.2rem; }
    .password-hint { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.3rem; }
  </style>
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="index.html"><span class="dot"></span>FraudShield</a>
  <ul class="nav-links">
    <li><a href="login.html">Login</a></li>
    <li><a href="signup.html" class="active">Signup</a></li>
    <li><a href="payment.html">Payment</a></li>
    <li><a href="promo.html">Promo</a></li>
    <li><a href="dashboard.html" class="dashboard-link">⬡ Dashboard</a></li>
  </ul>
</nav>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-header">
      <div class="module-tag">Module 02 / Identity Theft</div>
      <h1>Create account</h1>
      <p>Fraud checks run silently in the background</p>
    </div>
    <div class="card">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="full_name" placeholder="Jane Doe" required autofocus>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <div class="password-hint">Minimum 8 characters</div>
      </div>
      <button class="btn-submit" id="submitBtn" onclick="doRegister()">
        Create Account →
      </button>
    </div>
    <div class="verdict" id="verdict">
      <div class="verdict-title" id="verdictTitle"></div>
      <div id="verdictMsg"></div>
      <div class="verdict-score" id="verdictScore"></div>
      <ul class="verdict-flags" id="verdictFlags"></ul>
    </div>
    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>
<script>
const API = 'http://127.0.0.1:8000';

async function doRegister() {
  const full_name = document.getElementById('full_name').value.trim();
  const email     = document.getElementById('email').value.trim();
  const password  = document.getElementById('password').value;
  const btn       = document.getElementById('submitBtn');

  if (!full_name || !email || !password) return;
  if (password.length < 8) {
    showVerdict({ action: 'block', message: 'Password must be at least 8 characters.', fraud_score: 0, flags: [] });
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';
  hideVerdict();

  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ full_name, email, password }),
    });
    const data = await res.json();
    showVerdict(data);
  } catch (err) {
    showError('Could not reach server. Is FastAPI running?');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account →';
  }
}

function showVerdict(data) {
  const el    = document.getElementById('verdict');
  const title = document.getElementById('verdictTitle');
  const msg   = document.getElementById('verdictMsg');
  const score = document.getElementById('verdictScore');
  const flags = document.getElementById('verdictFlags');
  const action = data.action;
  const pct    = ((data.fraud_score || 0) * 100).toFixed(1);
  el.className = `verdict ${action}`;
  if (action === 'allow')       title.textContent = '✓ Account created!';
  else if (action === 'review') title.textContent = '⚠ Account created — flagged for review';
  else                          title.textContent = '✗ Registration blocked';
  msg.textContent   = data.message;
  score.textContent = data.fraud_score ? `Fraud score: ${pct}%` : '';
  flags.innerHTML   = '';
  (data.flags || []).forEach(f => {
    const li = document.createElement('li');
    li.textContent = f;
    flags.appendChild(li);
  });
  el.style.display = 'block';
}

function hideVerdict() { document.getElementById('verdict').style.display = 'none'; }

function showError(msg) {
  const el = document.getElementById('verdict');
  el.className = 'verdict block';
  document.getElementById('verdictTitle').textContent = '✗ Error';
  document.getElementById('verdictMsg').textContent   = msg;
  document.getElementById('verdictScore').textContent = '';
  document.getElementById('verdictFlags').innerHTML   = '';
  el.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
